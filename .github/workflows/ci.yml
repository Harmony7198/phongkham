# ngay khi sự kiện phát sinh => lập tức kích hoạt workflow này
on:
  workflow_dispatch:

#job test
jobs:
test:
#lựa chọn máy runner để chạy workflow
runs-on: ubuntu-latest

  steps:
    #step 1. lấy source về
    - name: Clone/Checkout source code
      uses: actions/checkout@v3
    #step 2. cài đặt caccs thư viện phụ thuộc
    - name: Install dependencies
      run: |
      node --version
      npm --version
      pwd
      ls -al
    #step 3. chạy test
    - name: Run tests
      run: npm test
